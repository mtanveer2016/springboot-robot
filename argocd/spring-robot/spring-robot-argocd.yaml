apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: springboot-robot
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    path: Kubernetes
    repoURL: https://github.com/mtanveer2016/springboot-robot
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
